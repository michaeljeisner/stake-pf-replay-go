version: '3'

vars:
  NPM: '{{if eq OS "windows"}}npm.cmd{{else}}npm{{end}}'

tasks:
  install:frontend:deps:
    summary: Installs frontend dependencies
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/**/*
    cmds:
      - '{{.NPM}} install'

  build:frontend:
    summary: Builds the frontend project
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - '{{.NPM}} run build'

  dev:frontend:
    summary: Runs the frontend in development mode
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - '{{.NPM}} run dev -- --host 127.0.0.1 --port {{.VITE_PORT | default 9245}}'

  go:mod:tidy:
    summary: Tidies Go module dependencies
    cmds:
      - go mod tidy
