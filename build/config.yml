version: '3'

info:
  companyName: "MJE Development"
  productName: "WEN?"
  productIdentifier: "com.mjedevelopment.wen"
  description: "A privacy-focused desktop application for analyzing provable fairness."
  copyright: "(c) 2024-2025 Michael Eisner. All rights reserved."
  comments: "A privacy-focused desktop application for analyzing provable fairness. Built with Wails."
  version: "1.0.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend/dist
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: once
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: wails3 task build
      type: blocking
    - cmd: wails3 task run
      type: primary

fileAssociations:
